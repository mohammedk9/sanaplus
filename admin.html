<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة العروض</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        .offer-admin-card { transition: all 0.2s ease; }
        .offer-admin-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full text-center">
            <div class="text-5xl mb-4">🔐</div>
            <h2 class="text-2xl font-bold mb-2 text-[#4a3f54]">لوحة التحكم</h2>
            <p class="text-gray-400 mb-6 text-sm">إدارة عروض سنا بلس</p>
            <input type="password" id="admin-password" placeholder="كلمة المرور"
                class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-lg focus:border-[#4a3f54] focus:outline-none">
            <button onclick="login()"
                class="w-full bg-[#4a3f54] text-white p-4 rounded-xl font-bold text-lg hover:opacity-90">
                دخول
            </button>
            <p id="login-error" class="text-red-500 mt-4 hidden font-bold">❌ كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="admin-dashboard" class="hidden fade-in">
        <nav class="bg-[#4a3f54] text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">⚙️ إدارة العروض</h1>
                <div class="flex items-center gap-3">
                    <a href="index.html" target="_blank" class="bg-white/20 px-4 py-2 rounded-lg text-sm hover:bg-white/30">
                        👁️ معاينة
                    </a>
                    <button onclick="logout()" class="bg-red-500/80 px-4 py-2 rounded-lg text-sm hover:bg-red-600">
                        خروج
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto p-6">
            <!-- إحصائيات -->
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl shadow-sm text-center">
                    <div class="text-3xl font-bold text-[#4a3f54]" id="stat-total">0</div>
                    <div class="text-sm text-gray-400 mt-1">إجمالي</div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm text-center">
                    <div class="text-3xl font-bold text-green-600" id="stat-active">0</div>
                    <div class="text-sm text-gray-400 mt-1">مفعّلة</div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm text-center">
                    <div class="text-3xl font-bold text-gray-400" id="stat-inactive">0</div>
                    <div class="text-sm text-gray-400 mt-1">متوقفة</div>
                </div>
            </div>

            <!-- زر إضافة -->
            <button onclick="showForm()" id="add-btn"
                class="w-full bg-green-600 text-white p-4 rounded-2xl font-bold text-lg hover:bg-green-700 mb-8 shadow-md">
                + إضافة عرض جديد
            </button>

            <!-- نموذج الإضافة/التعديل -->
            <div id="offer-form" class="hidden bg-white p-8 rounded-3xl shadow-lg mb-8 border-2 border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="form-title" class="text-xl font-bold">➕ إضافة عرض جديد</h3>
                    <button onclick="hideForm()" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
                </div>
                <input type="hidden" id="offer-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">اسم العرض *</label>
                        <input type="text" id="offer-title" placeholder="مثال: عرض الترويقة"
                            class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">وصف العرض *</label>
                        <textarea id="offer-description" rows="3" placeholder="مثال: قهوة اليوم كبير + أي نوع حلا"
                            class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">السعر * (ر.س)</label>
                            <input type="number" id="offer-price" placeholder="25"
                                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">السعر القديم</label>
                            <input type="number" id="offer-old-price" placeholder="36"
                                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">الترتيب</label>
                            <input type="number" id="offer-order" placeholder="1" value="1"
                                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">شارة مميزة (اختياري)</label>
                        <input type="text" id="offer-badge" placeholder="مثال: الأكثر مبيعاً"
                            class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-[#4a3f54] focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="saveOffer()"
                        class="flex-1 bg-[#4a3f54] text-white p-4 rounded-xl font-bold text-lg hover:opacity-90">
                        💾 حفظ العرض
                    </button>
                    <button onclick="hideForm()"
                        class="bg-gray-200 text-gray-600 px-8 py-4 rounded-xl font-bold hover:bg-gray-300">
                        إلغاء
                    </button>
                </div>
            </div>

            <!-- قائمة العروض -->
            <div id="offers-list" class="space-y-4"></div>
            <div id="no-offers" class="hidden text-center py-16 bg-white rounded-3xl shadow-sm">
                <div class="text-6xl mb-4">📋</div>
                <h3 class="text-xl font-bold text-gray-400">لا توجد عروض بعد</h3>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الحذف -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-xl font-bold mb-2">تأكيد الحذف</h3>
            <p class="text-gray-500 mb-6">هل أنت متأكد؟ لا يمكن التراجع</p>
            <input type="hidden" id="delete-offer-id">
            <div class="flex gap-3">
                <button onclick="confirmDelete()" class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700">نعم، احذف</button>
                <button onclick="closeDeleteModal()" class="flex-1 bg-gray-200 text-gray-600 p-3 rounded-xl font-bold hover:bg-gray-300">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- رسالة النجاح -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold z-[100]">
        <span id="toast-text">تم بنجاح</span>
    </div>

    <script>
    // =============================================
    //  ⚠️ ضع نفس إعدادات Firebase
    // =============================================
    const firebaseConfig = {
        apiKey: "AIzaSyCHjzKzjxKp1J-r-0pyLfoKTRTZmSBZUj4",
  authDomain: "sanaplus-3cf54.firebaseapp.com",
  projectId: "sanaplus-3cf54",
  storageBucket: "sanaplus-3cf54.firebasestorage.app",
  messagingSenderId: "906961038478",
  appId: "1:906961038478:web:18dd1d5fd05a35752daddf",
  measurementId: "G-RQN5B8MCXQ"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // =============================================
    //  ⚠️ غيّر هذه القيم!
    //  ADMIN_PASSWORD = كلمة مرور شاشة الدخول
    //  WRITE_SECRET = نفس المفتاح في Firestore Rules
    // =============================================
    const ADMIN_PASSWORD = "Sanaplus9559";
    const WRITE_SECRET = "Sanaplus9559";

    // =============================================
    //  تسجيل الدخول / الخروج
    // =============================================
    function login() {
        const pw = document.getElementById('admin-password').value;
        if (pw === ADMIN_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            loadOffers();
        } else {
            const err = document.getElementById('login-error');
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }
    }
    function logout() {
        document.getElementById('admin-dashboard').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('admin-password').value = '';
    }
    document.getElementById('admin-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });

    // =============================================
    //  تحميل العروض (للعرض فقط - read)
    // =============================================
    function loadOffers() {
        db.collection('offers').orderBy('order', 'asc').onSnapshot((snapshot) => {
            const list = document.getElementById('offers-list');
            const noOffers = document.getElementById('no-offers');
            list.innerHTML = '';
            let total = 0, active = 0, inactive = 0;

            if (snapshot.empty) {
                noOffers.classList.remove('hidden');
                updateStats(0, 0, 0);
                return;
            }
            noOffers.classList.add('hidden');

            snapshot.forEach((doc) => {
                const o = doc.data();
                total++;
                if (o.isActive) active++; else inactive++;

                const statusColor = o.isActive ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500';
                const statusText = o.isActive ? '🟢 مفعّل' : '⚪ متوقف';
                const opacity = o.isActive ? '' : 'opacity-60';

                list.innerHTML += `
                    <div class="offer-admin-card bg-white p-5 rounded-2xl shadow-sm border fade-in ${opacity}">
                        <div class="flex flex-col md:flex-row justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2 flex-wrap">
                                    <h3 class="font-bold text-lg">${o.title}</h3>
                                    <span class="text-xs px-3 py-1 rounded-full font-bold ${statusColor}">${statusText}</span>
                                    ${o.badge ? '<span class="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full">' + o.badge + '</span>' : ''}
                                </div>
                                <p class="text-sm text-gray-500 mb-2">${o.description}</p>
                                <span class="font-bold text-lg text-[#d97706]">${o.price} ر.س</span>
                                ${o.oldPrice ? ' <span class="line-through text-gray-400 text-sm">' + o.oldPrice + ' ر.س</span>' : ''}
                            </div>
                            <div class="flex md:flex-col gap-2 justify-end">
                                <button onclick="toggleOffer('${doc.id}', ${o.isActive})"
                                    class="px-4 py-2 rounded-xl text-sm font-bold ${o.isActive ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200' : 'bg-green-100 text-green-700 hover:bg-green-200'}">
                                    ${o.isActive ? '⏸️ إيقاف' : '▶️ تفعيل'}
                                </button>
                                <button onclick="editOffer('${doc.id}')"
                                    class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-200">
                                    ✏️ تعديل
                                </button>
                                <button onclick="showDeleteModal('${doc.id}')"
                                    class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-200">
                                    🗑️ حذف
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
            updateStats(total, active, inactive);
        });
    }

    function updateStats(t, a, i) {
        document.getElementById('stat-total').textContent = t;
        document.getElementById('stat-active').textContent = a;
        document.getElementById('stat-inactive').textContent = i;
    }

    // =============================================
    //  النموذج
    // =============================================
    function showForm() {
        document.getElementById('offer-form').classList.remove('hidden');
        document.getElementById('form-title').textContent = '➕ إضافة عرض جديد';
        document.getElementById('offer-id').value = '';
        document.getElementById('offer-title').value = '';
        document.getElementById('offer-description').value = '';
        document.getElementById('offer-price').value = '';
        document.getElementById('offer-old-price').value = '';
        document.getElementById('offer-badge').value = '';
        document.getElementById('offer-order').value = '1';
        document.getElementById('add-btn').classList.add('hidden');
        document.getElementById('offer-form').scrollIntoView({ behavior: 'smooth' });
    }
    function hideForm() {
        document.getElementById('offer-form').classList.add('hidden');
        document.getElementById('add-btn').classList.remove('hidden');
    }

    // =============================================
    //  حفظ العرض (مع المفتاح السري)
    // =============================================
    async function saveOffer() {
        const id = document.getElementById('offer-id').value;
        const title = document.getElementById('offer-title').value.trim();
        const description = document.getElementById('offer-description').value.trim();
        const price = Number(document.getElementById('offer-price').value);
        const oldPrice = document.getElementById('offer-old-price').value ? Number(document.getElementById('offer-old-price').value) : null;
        const badge = document.getElementById('offer-badge').value.trim() || null;
        const order = Number(document.getElementById('offer-order').value) || 1;

        if (!title || !description || !price) {
            alert('يرجى تعبئة الحقول المطلوبة *');
            return;
        }

        // ✅ نضيف المفتاح السري مع البيانات للتحقق في القواعد
        const data = {
            title,
            description,
            price,
            oldPrice,
            badge,
            order,
            secret: WRITE_SECRET  // ← هذا يُستخدم فقط للتحقق في Rules
        };

        try {
            if (id) {
                await db.collection('offers').doc(id).update(data);
                showToast('تم تعديل العرض ✅');
            } else {
                data.isActive = true;
                data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('offers').add(data);
                showToast('تم إضافة العرض 🎉');
            }
            hideForm();
        } catch (e) {
            alert('خطأ: ' + e.message);
            console.error(e);
        }
    }

    // =============================================
    //  تعديل عرض
    // =============================================
    async function editOffer(id) {
        const doc = await db.collection('offers').doc(id).get();
        const o = doc.data();
        document.getElementById('offer-form').classList.remove('hidden');
        document.getElementById('form-title').textContent = '✏️ تعديل العرض';
        document.getElementById('offer-id').value = id;
        document.getElementById('offer-title').value = o.title;
        document.getElementById('offer-description').value = o.description;
        document.getElementById('offer-price').value = o.price;
        document.getElementById('offer-old-price').value = o.oldPrice || '';
        document.getElementById('offer-badge').value = o.badge || '';
        document.getElementById('offer-order').value = o.order || 1;
        document.getElementById('add-btn').classList.add('hidden');
        document.getElementById('offer-form').scrollIntoView({ behavior: 'smooth' });
    }

    // =============================================
    //  تفعيل / إيقاف (مع المفتاح السري)
    // =============================================
    async function toggleOffer(id, current) {
        try {
            await db.collection('offers').doc(id).update({
                isActive: !current,
                secret: WRITE_SECRET  // ← للتحقق
            });
            showToast(current ? 'تم إيقاف العرض ⏸️' : 'تم تفعيل العرض ▶️');
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    }

    // =============================================
    //  حذف عرض (مع المفتاح السري)
    // =============================================
    function showDeleteModal(id) {
        document.getElementById('delete-offer-id').value = id;
        document.getElementById('delete-modal').classList.remove('hidden');
    }
    function closeDeleteModal() {
        document.getElementById('delete-modal').classList.add('hidden');
    }
    async function confirmDelete() {
        const id = document.getElementById('delete-offer-id').value;
        try {
            // للحذف نحتاج طريقة مختلفة - نعدّل أولاً ثم نحذف
            // أو نستخدم قواعد تسمح بالحذف للجميع (لأن الحذف لا يرسل data)
            await db.collection('offers').doc(id).delete();
            closeDeleteModal();
            showToast('تم حذف العرض 🗑️');
        } catch (e) {
            alert('خطأ: ' + e.message);
        }
    }

    // =============================================
    //  رسالة النجاح
    // =============================================
    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-text').textContent = msg;
        t.classList.remove('hidden');
        setTimeout(() => t.classList.add('hidden'), 3000);
    }
    </script>
</body>
</html>
